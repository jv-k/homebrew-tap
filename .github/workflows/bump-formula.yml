name: Bump formula

# Keeps Formula/verbump.rb pointing at the latest stable vX.Y.Z tag of
# jv-k/VerBump. Runs on a schedule (no cross-repo secret needed) and can be
# dispatched manually right after cutting a release. Pre-release tags
# (e.g. v2.1.0-rc.1) never match the stable-tag pattern and are ignored.

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Find latest stable tag of jv-k/VerBump
        id: latest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="$(gh api repos/jv-k/VerBump/tags --paginate --jq '.[].name' \
                 | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)"
          [ -n "$tag" ] || { echo "no stable tag found" >&2; exit 1; }
          current="$(grep -Eo 'refs/tags/v[0-9]+\.[0-9]+\.[0-9]+' Formula/verbump.rb | sed 's|refs/tags/||')"
          echo "tag=$tag"         >> "$GITHUB_OUTPUT"
          echo "current=$current" >> "$GITHUB_OUTPUT"

      - name: Update url and sha256
        if: steps.latest.outputs.tag != steps.latest.outputs.current
        run: |
          tag="${{ steps.latest.outputs.tag }}"
          curl -fsSL -o release.tar.gz "https://github.com/jv-k/VerBump/archive/refs/tags/${tag}.tar.gz"
          sha="$(sha256sum release.tar.gz | cut -d' ' -f1)"
          rm release.tar.gz
          sed -i -E "s|refs/tags/v[0-9]+\.[0-9]+\.[0-9]+\.tar\.gz|refs/tags/${tag}.tar.gz|" Formula/verbump.rb
          sed -i -E "s|^(  sha256 \")[0-9a-f]{64}(\")$|\1${sha}\2|" Formula/verbump.rb
          grep -q "refs/tags/${tag}.tar.gz" Formula/verbump.rb
          grep -q "$sha" Formula/verbump.rb

      - name: Commit, push and re-run CI
        if: steps.latest.outputs.tag != steps.latest.outputs.current
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/verbump.rb
          git commit -m "chore(formula): bump verbump to ${{ steps.latest.outputs.tag }}"
          git push
          # Pushes made with GITHUB_TOKEN don't trigger push workflows —
          # dispatch CI explicitly so the bumped formula still gets audited.
          gh workflow run ci.yml --ref main
