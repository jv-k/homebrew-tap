name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@18fcb8e3e06b4247c676c506750dc95ea7226479 # 2026.07.13.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Style check
        run: brew style jv-k/tap

      - name: Audit (strict, online)
        run: brew audit --strict --online --tap jv-k/tap

      - name: Install
        run: brew install --formula jv-k/tap/verbump

      - name: Smoke-test installed binary
        run: |
          VerBump --version
          VerBump --help

      - name: Test
        run: brew test --verbose jv-k/tap/verbump
